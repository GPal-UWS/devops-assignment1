services:
  flask-weight-converter:
    build:
      context: assignment_1_flask_app
      dockerfile: Dockerfile
    image: gpaluws/flask-weight-conversion-app:latest
  nginx:
    image: nginx:latest
    ports:
    - "80:80"
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
    - flask-weight-converter